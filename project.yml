name: APIUsageStatus
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: APIUsageStatus
    GENERATE_INFOPLIST_FILE: NO

targets:
  APIUsageStatus:
    type: application
    platform: macOS
    sources:
      - path: APIUsageStatus
        excludes:
          - "**/*.xcodeproj"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.APIUsageStatus
        INFOPLIST_FILE: APIUsageStatus/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: APIUsageStatus/APIUsageStatus.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    entitlements:
      path: APIUsageStatus/APIUsageStatus.entitlements

  APIUsageStatusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: APIUsageStatusTests
    dependencies:
      - target: APIUsageStatus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.APIUsageStatusTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/APIUsageStatus.app/Contents/MacOS/APIUsageStatus"
        BUNDLE_LOADER: "$(TEST_HOST)"